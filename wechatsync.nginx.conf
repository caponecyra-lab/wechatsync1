# /etc/nginx/sites-available/wechatsync
# 生产环境 Nginx 反向代理配置
#
# 使用方法：
#   sudo cp wechatsync.nginx.conf /etc/nginx/sites-available/wechatsync
#   sudo ln -s /etc/nginx/sites-available/wechatsync /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d your-domain.com   # 自动申请 HTTPS
#   sudo nginx -s reload

server {
    listen 80;
    server_name your-domain.com;

    # 强制 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（由 certbot 自动填写）
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 媒体文件上传最大 100 MB
    client_max_body_size 100m;

    # API 反代
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket（Socket.IO 长连接）
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # 媒体静态文件（Nginx 直接提供，绕过 Node）
    location /uploads/ {
        alias   /path/to/wechatsync-server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # 防止直接列目录
        autoindex off;

        # 只允许常见媒体类型
        location ~* \.(jpg|jpeg|png|gif|webp|mp4|mp3|amr|m4a)$ {
            expires 7d;
        }
    }

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options         DENY;
    add_header Referrer-Policy         no-referrer;
}
