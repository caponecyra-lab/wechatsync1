# docker-compose.yml
# 一键部署：docker compose up -d

version: '3.9'

services:
  wechatsync:
    build: .
    container_name: wechatsync-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SECRET_TOKEN=${SECRET_TOKEN:-changeme123}
    volumes:
      - ./data:/app/data          # SQLite 数据库持久化
      - ./uploads:/app/uploads    # 媒体文件持久化
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选：Nginx（如果不用云服务商的负载均衡）
  nginx:
    image: nginx:alpine
    container_name: wechatsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./wechatsync.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/usr/share/nginx/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - wechatsync
